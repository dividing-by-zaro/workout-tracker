name: Auto-Triage Issues

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  triage:
    if: github.event.issue.user.login == 'dividing-by-zaro'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 20"
          prompt: |
            You are triaging GitHub issue #${{ github.event.issue.number }} in the Kiln iOS workout-tracking app (a 2-user personal app — developer + wife).

            This is **pre-thinking only** — you are NOT implementing or investigating. Do not open source files to verify line numbers. Do not grep/explore the codebase. Your job is to give the developer a useful starting point before they sit down to work on this.

            STEP 1 — Post an in-progress comment IMMEDIATELY:
              gh issue comment ${{ github.event.issue.number }} --body "🔍 Auto-triage in progress…"

            STEP 2 — Read the issue:
              gh issue view ${{ github.event.issue.number }}

            STEP 3 — Classify into ONE of three archetypes:

              A. **BUG** — describes broken / wrong / regressed behavior.
              B. **SPEC'D FEATURE** — already contains a detailed design (file references, acceptance criteria, implementation sketch). The author has done the design work.
              C. **OPEN IDEA** — feature ask without a design (e.g. "implement supersets", "add a streaks counter").

            STEP 4 — Branch:

              IF A (BUG):
                - Brainstorm 2–3 plausible causes. Be exploratory, not definitive.
                - For each, name a starting lead: which subsystem to look at, what to log, what to bisect.
                - You MAY run ONE git history search if a keyword from the issue suggests something recurring:
                    git log --oneline --all --grep "<keyword>" | head -20
                  If you find a related prior fix, mention the commit hash + subject.
                - Do NOT open Swift files. Do NOT cite line numbers. Pre-thinking only.

              IF B (SPEC'D FEATURE):
                - Do nothing additional. The author already did the work.
                - One-sentence acknowledgement that the spec is ready to implement.
                - Optionally ONE risk callout if something obvious jumps out (e.g. "the gesture conflict resolution between long-press contexts is the riskiest part — pick that first"). Skip if nothing obvious.

              IF C (OPEN IDEA):
                - Propose **2–3 distinct implementation approaches**.
                - For each: one-sentence description, key tradeoffs (UX / complexity / risk), rough effort.
                - Note which you'd lean toward and why.

            STEP 5 — Compute RICE (always):
              - Reach: user-impact-events / month. 2 users × ~12 workouts/mo = ~24/mo upper bound. Score lower for niche flows.
              - Impact: 3 (massive — blocks core flow), 2 (high), 1 (medium), 0.5 (low), 0.25 (cosmetic).
              - Confidence: 100 / 80 / 50 (%).
              - Effort: person-days for a solo iOS dev including testing.
              - **RICE = (Reach × Impact × Confidence/100) / Effort**, rounded to 1 decimal.

            STEP 6 — Post the final comment. Write to a file, then:
              gh issue comment ${{ github.event.issue.number }} --body-file <file>

            FINAL COMMENT FORMAT (use exactly):

            ## Triage

            **Type:** Bug | Spec'd Feature | Open Idea
            **RICE:** <score>

            | Factor | Value | Reasoning |
            |---|---|---|
            | Reach | <n>/mo | <one line> |
            | Impact | <n> | <one line> |
            | Confidence | <n>% | <one line> |
            | Effort | <n>d | <one line> |

            ### Pre-thinking

            <BUG: 2–3 candidate causes + leads, optionally a related prior commit.>
            <SPEC'D: one-sentence ack, optionally one risk callout.>
            <OPEN IDEA: numbered list of 2–3 approaches with tradeoffs and a lean.>

            ---
            *Auto-triage. Pre-thinking only — not investigation.*

            Be terse. Be honest about uncertainty. Do not fabricate file paths, line numbers, or commit hashes.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
