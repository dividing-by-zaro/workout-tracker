name: Kiln
options:
  bundleIdPrefix: app.izaro
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: 1
configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

targets:
  Kiln:
    type: application
    platform: iOS
    sources:
      - path: Kiln
        excludes:
          - "**/*.xcassets/AppIcon.appiconset/Contents.json"
          - Resources
    resources:
      - path: Kiln/Assets.xcassets
      - path: Kiln/Resources
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        PRODUCT_BUNDLE_IDENTIFIER: app.izaro.kiln
        PRODUCT_NAME: Kiln
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        DEVELOPMENT_TEAM: 85S8MAN3A4
    entitlements:
      path: Kiln/Kiln.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.app.izaro.kiln
    info:
      path: Kiln/Info.plist
      properties:
        UIBackgroundModes: [audio]
        UIUserInterfaceStyle: Light
        NSSupportsLiveActivities: true
        TimerBackendURL: $(TIMER_BACKEND_URL)
        TimerBackendAPIKey: $(TIMER_BACKEND_API_KEY)
    dependencies:
      - target: KilnWidgets
        embed: true

  KilnWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: KilnWidgets
      - path: Kiln/Shared
    resources:
      - path: KilnWidgets/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.izaro.kiln.kilnwidgets
        PRODUCT_NAME: KilnWidgets
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        DEVELOPMENT_TEAM: 85S8MAN3A4
    entitlements:
      path: KilnWidgets/KilnWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.izaro.kiln
    info:
      path: KilnWidgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  Kiln:
    build:
      targets:
        Kiln: all
        KilnWidgets: all
    run:
      config: Debug
